name: Update Firearms Catalog

on:
  schedule:
    - cron: '0 11 * * *'  # 6am EST daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-catalog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch and process Lipsey's catalog
        env:
          LIPSEYS_EMAIL: ${{ secrets.LIPSEYS_EMAIL }}
          LIPSEYS_PASSWORD: ${{ secrets.LIPSEYS_PASSWORD }}
        run: |
          set -e

          # Authenticate
          echo "Authenticating with Lipsey's API..."
          AUTH_RESPONSE=$(curl -s -X POST \
            "https://api.lipseys.com/api/Integration/Authentication/Login" \
            -H "Content-Type: application/json" \
            -d "{\"Email\":\"${LIPSEYS_EMAIL}\",\"Password\":\"${LIPSEYS_PASSWORD}\"}")

          TOKEN=$(echo "$AUTH_RESPONSE" | jq -r '.token')

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "Authentication failed"
            echo "$AUTH_RESPONSE"
            exit 1
          fi

          echo "Authentication successful"

          # Fetch catalog
          echo "Fetching catalog feed..."
          CATALOG=$(curl -s -X GET \
            "https://api.lipseys.com/api/Integration/Items/CatalogFeed" \
            -H "Token: ${TOKEN}")

          # Filter and slim down the data
          echo "Processing catalog data..."
          echo "$CATALOG" | jq '[
            .data[]
            | select(.quantity > 0 and .itemType == "Firearm")
            | {
                model: .model,
                manufacturer: .manufacturer,
                caliberGauge: .caliberGauge,
                type: .type,
                msrp: .msrp,
                barrelLength: .barrelLength,
                capacity: .capacity,
                finish: .finish,
                action: .action,
                weight: .weight,
                upc: .upc,
                description1: .description1,
                family: .family,
                inStock: true
              }
          ]' > catalog-data.json

          ITEM_COUNT=$(jq 'length' catalog-data.json)
          echo "Processed ${ITEM_COUNT} in-stock firearms"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog-data.json
          if git diff --cached --quiet; then
            echo "No changes to catalog data"
          else
            git commit -m "Update firearms catalog data"
            git push
          fi
