name: Update Firearms Catalog

on:
  schedule:
    - cron: '0 11 * * *'  # 6am EST daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-catalog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch and process Lipsey's catalog
        env:
          LIPSEYS_EMAIL: ${{ secrets.LIPSEYS_EMAIL }}
          LIPSEYS_PASSWORD: ${{ secrets.LIPSEYS_PASSWORD }}
        run: |
          set -e

          # Authenticate
          echo "Authenticating with Lipsey's API..."
          TOKEN=$(python3 -c "
          import urllib.request, json, os
          payload = json.dumps({'Email': os.environ['LIPSEYS_EMAIL'], 'Password': os.environ['LIPSEYS_PASSWORD']}).encode()
          req = urllib.request.Request('https://api.lipseys.com/api/Integration/Authentication/Login', data=payload, headers={'Content-Type': 'application/json'}, method='POST')
          resp = urllib.request.urlopen(req)
          data = json.loads(resp.read())
          print(data.get('token', ''))
          ")

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "Authentication failed"
            echo "$AUTH_RESPONSE"
            exit 1
          fi

          echo "Authentication successful"

          # Fetch catalog and process in one step
          echo "Fetching and processing catalog feed..."
          curl -s -X GET \
            "https://api.lipseys.com/api/Integration/Items/CatalogFeed" \
            -H "Token: ${TOKEN}" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          items = data.get('data', [])
          filtered = []
          for item in items:
              if item.get('quantity', 0) > 0 and item.get('itemType') == 'Firearm':
                  filtered.append({
                      'model': item.get('model', ''),
                      'manufacturer': item.get('manufacturer', ''),
                      'caliberGauge': item.get('caliberGauge', ''),
                      'type': item.get('type', ''),
                      'msrp': item.get('msrp', 0),
                      'barrelLength': item.get('barrelLength', ''),
                      'capacity': item.get('capacity', ''),
                      'finish': item.get('finish', ''),
                      'action': item.get('action', ''),
                      'weight': item.get('weight', ''),
                      'upc': item.get('upc', ''),
                      'description1': item.get('description1', ''),
                      'family': item.get('family', ''),
                      'inStock': True
                  })
          with open('catalog-data.json', 'w') as f:
              json.dump(filtered, f, separators=(',', ':'))
          print(f'Processed {len(filtered)} in-stock firearms')
          "

          echo "Catalog data saved to catalog-data.json"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog-data.json
          if git diff --cached --quiet; then
            echo "No changes to catalog data"
          else
            git commit -m "Update firearms catalog data"
            git push
          fi
